<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>Catálogo — Óticas Precisão</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --black: #060606;
  --black-2: #0c0c0c;
  --black-3: #121212;
  --gold: #d4af37;
  --gold-2: #f5d97a;
  --gold-deep: #a8801f;
  --white: #fcfbfa;
  --muted: #b8b4ab;
  --line: rgba(212,175,55,0.15);
  --radius: 18px;
  --shadow-gold: 0 10px 40px -10px rgba(212,175,55,0.35);
  --transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  --bg: #060606;
  --bg-2: #0c0c0c;
  --bg-3: #121212;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(212,175,55,0.08);
  --border: rgba(255,255,255,0.05);
  --border-gold: rgba(212,175,55,0.2);
  --text-main: #fcfbfa;
  --text-muted: #b8b4ab;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(212,175,55,0.10), transparent 70%),
    radial-gradient(900px 500px at 100% 20%, rgba(212,175,55,0.06), transparent 60%),
    radial-gradient(800px 600px at 50% 110%, rgba(212,175,55,0.08), transparent 60%),
    var(--bg);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse at center, #000 40%, transparent 80%);
}

.container { max-width: 1180px; margin: 0 auto; padding: 0 22px; }
.serif { font-family: 'Cormorant Garamond', serif; letter-spacing: 0.5px; }

.gold-text {
  background: linear-gradient(135deg, #f5d97a 0%, #d4af37 40%, #a8801f 70%, #f5d97a 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* ─── SEÇÃO HEADER ─── */
.catalogo-header {
  padding: 90px 0 60px;
  text-align: center;
  position: relative;
}

.catalogo-header .tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--border-gold);
  padding: 6px 16px;
  border-radius: 40px;
  margin-bottom: 24px;
  background: rgba(212,175,55,0.05);
}

.catalogo-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.4rem, 6vw, 3.8rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 16px;
}

.catalogo-header p {
  color: var(--text-muted);
  font-size: 0.95rem;
  max-width: 480px;
  margin: 0 auto;
  font-weight: 300;
}

/* ─── FILTROS / CATEGORIAS ─── */
.filtros {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.filtro-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: 40px;
  border: 1px solid var(--border-gold);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
}

.filtro-btn:hover,
.filtro-btn.ativo {
  background: rgba(212,175,55,0.12);
  border-color: var(--gold);
  color: var(--gold-2);
}

/* ─── GRID DE PRODUTOS ─── */
.produtos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 28px;
  margin-bottom: 80px;
}

/* ─── CARD PRODUTO ─── */
.produto-card {
  position: relative;
  background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid var(--border-gold);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
  cursor: default;
}

.produto-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,175,55,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 0;
}

.produto-card:hover {
  transform: translateY(-6px);
  border-color: rgba(212,175,55,0.5);
  box-shadow: 0 24px 60px -12px rgba(212,175,55,0.2);
}

.produto-card:hover::before { opacity: 1; }

/* BADGE MAIS VENDIDO */
.badge-top {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 3;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--black);
  background: linear-gradient(135deg, #f5d97a, #d4af37);
  padding: 5px 12px;
  border-radius: 40px;
  box-shadow: 0 4px 16px rgba(212,175,55,0.4);
}

/* IMAGEM */
.produto-img {
  position: relative;
  width: 100%;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.02);
  overflow: hidden;
  z-index: 1;
}

.produto-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
  filter: brightness(0.9);
}

.produto-card:hover .produto-img img {
  transform: scale(1.05);
  filter: brightness(1);
}

/* EMOJI PLACEHOLDER */
.produto-emoji {
  font-size: 5rem;
  line-height: 1;
  filter: drop-shadow(0 8px 24px rgba(212,175,55,0.15));
  transition: transform 0.4s ease;
}
.produto-card:hover .produto-emoji { transform: scale(1.08) rotate(-3deg); }

/* INFO */
.produto-info {
  padding: 20px 22px 22px;
  position: relative;
  z-index: 1;
}

.produto-categoria {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.produto-nome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 6px;
  line-height: 1.2;
}

.produto-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 18px;
  font-weight: 300;
  line-height: 1.5;
}

.produto-rodape {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.produto-preco {
  display: flex;
  flex-direction: column;
}

.produto-preco-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.produto-preco-valor {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 700;
  background: linear-gradient(135deg, #f5d97a, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
}

/* BOTÕES CARD */
.card-btns {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: flex-end;
}

.btn-whats-rapido {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--black);
  background: linear-gradient(135deg, #25d366, #128c7e);
  border: none;
  padding: 7px 14px;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}

.btn-whats-rapido:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(37,211,102,0.35);
}

.btn-add-carrinho {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-2);
  background: transparent;
  border: 1px solid var(--border-gold);
  padding: 7px 14px;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}

.btn-add-carrinho:hover {
  background: rgba(212,175,55,0.12);
  border-color: var(--gold);
  transform: scale(1.05);
}

.btn-add-carrinho.adicionado {
  background: rgba(212,175,55,0.15);
  border-color: var(--gold);
  color: var(--gold-2);
}

/* ─── CARRINHO FLUTUANTE ─── */
.carrinho-fab {
  position: fixed;
  bottom: 32px;
  left: 32px;
  z-index: 150;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #1a1409, #0c0a04);
  border: 1px solid var(--gold);
  border-radius: 50px;
  padding: 13px 22px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 8px 32px rgba(212,175,55,0.3);
  color: var(--gold-2);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
}

.carrinho-fab:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 14px 44px rgba(212,175,55,0.45);
  border-color: var(--gold-2);
}

.carrinho-fab .fab-icon { font-size: 1.1rem; }

.carrinho-badge {
  background: linear-gradient(135deg, #f5d97a, #d4af37);
  color: var(--black);
  font-size: 0.68rem;
  font-weight: 800;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 2px;
}

.carrinho-fab.oculto { 
  opacity: 0; 
  pointer-events: none; 
  transform: translateY(20px) scale(0.9);
}

/* ─── PAINEL CARRINHO ─── */
.carrinho-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.carrinho-overlay.ativo { display: block; }

.carrinho-painel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(460px, 100vw);
  background: linear-gradient(160deg, #131106, #0a0902);
  border-left: 1px solid var(--border-gold);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
  box-shadow: -20px 0 80px rgba(0,0,0,0.6);
}

.carrinho-overlay.ativo .carrinho-painel { transform: translateX(0); }

.carrinho-head {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.carrinho-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.carrinho-title i { color: var(--gold); font-size: 1.2rem; }

.btn-fechar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: var(--transition);
}

.btn-fechar:hover {
  border-color: var(--gold);
  color: var(--gold);
}

/* LISTA ITENS */
.carrinho-lista {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,55,0.2) transparent;
}

.carrinho-vazio {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
  color: var(--text-muted);
  text-align: center;
}

.carrinho-vazio .vazio-icon {
  font-size: 3rem;
  opacity: 0.3;
  display: block;
}

.carrinho-vazio p { font-size: 0.9rem; }

.carrinho-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.item-emoji-mini {
  width: 54px;
  height: 54px;
  background: rgba(212,175,55,0.07);
  border: 1px solid var(--border-gold);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}

.item-info { flex: 1; min-width: 0; }

.item-nome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-cat {
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.item-preco {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold-2);
  white-space: nowrap;
}

/* CONTROLE QTDE */
.item-qty {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.qty-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border-gold);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: var(--transition);
}

.qty-btn:hover {
  background: rgba(212,175,55,0.15);
  border-color: var(--gold);
}

.qty-num {
  font-size: 0.9rem;
  font-weight: 600;
  min-width: 18px;
  text-align: center;
}

.btn-remover {
  background: none;
  border: none;
  color: rgba(255,100,100,0.5);
  cursor: pointer;
  padding: 4px;
  font-size: 0.8rem;
  transition: color 0.2s;
  flex-shrink: 0;
}

.btn-remover:hover { color: rgba(255,100,100,0.9); }

/* RODAPÉ CARRINHO */
.carrinho-foot {
  padding: 20px 28px 28px;
  border-top: 1px solid var(--line);
  background: rgba(0,0,0,0.2);
}

.resumo-linha {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.85rem;
}

.resumo-linha.total {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-gold);
  margin-bottom: 20px;
}

.resumo-linha.total .label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 700;
}

.resumo-linha.total .valor {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #f5d97a, #d4af37);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.label { color: var(--text-muted); }
.valor { font-weight: 600; }

/* BOTÃO ENVIAR WHATSAPP */
.btn-enviar-whats {
  width: 100%;
  padding: 16px 22px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #1a5c2e, #128c40, #25d366);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: var(--transition);
  box-shadow: 0 8px 28px rgba(37,211,102,0.3);
  margin-bottom: 10px;
}

.btn-enviar-whats:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(37,211,102,0.45);
  background: linear-gradient(135deg, #1d6633, #15a349, #2ee870);
}

.btn-enviar-whats:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.btn-limpar {
  width: 100%;
  background: none;
  border: 1px solid rgba(255,100,100,0.2);
  color: rgba(255,100,100,0.5);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.05em;
}

.btn-limpar:hover {
  border-color: rgba(255,100,100,0.5);
  color: rgba(255,100,100,0.85);
  background: rgba(255,100,100,0.05);
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, #1a1409, #0c0a04);
  border: 1px solid var(--gold);
  color: var(--gold-2);
  padding: 12px 22px;
  border-radius: 40px;
  font-size: 0.82rem;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(212,175,55,0.25);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── ANIMAÇÃO REVEAL ─── */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.in { opacity: 1; transform: translateY(0); }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .produtos-grid { grid-template-columns: 1fr; }
  .carrinho-fab { left: 16px; bottom: 20px; padding: 12px 18px; }
}
</style>
</head>
<body>

<!-- ─── SEÇÃO CATÁLOGO ─── -->
<section id="catalogo" style="padding: 40px 0 120px;">
  <div class="container">

    <div class="catalogo-header reveal">
      <span class="tag"><i class="fas fa-star" style="font-size:.65rem;"></i> Coleção Exclusiva</span>
      <h2 class="serif">
        Nosso <span class="gold-text">Catálogo</span>
      </h2>
      <p>Adicione os produtos ao carrinho e finalize seu pedido diretamente pelo WhatsApp com um de nossos atendentes.</p>
    </div>

    <!-- FILTROS -->
    <div class="filtros reveal">
      <button class="filtro-btn ativo" data-cat="todos" onclick="filtrar(this)">Todos</button>
      <button class="filtro-btn" data-cat="Armações" onclick="filtrar(this)">Armações</button>
      <button class="filtro-btn" data-cat="Solar" onclick="filtrar(this)">Solar</button>
      <button class="filtro-btn" data-cat="Smartwatch" onclick="filtrar(this)">Smartwatch</button>
      <button class="filtro-btn" data-cat="Lentes" onclick="filtrar(this)">Lentes</button>
      <button class="filtro-btn" data-cat="Acessórios" onclick="filtrar(this)">Acessórios</button>
    </div>

    <!-- GRID PRODUTOS -->
    <div class="produtos-grid" id="produtos-grid"></div>

  </div>
</section>

<!-- ─── CARRINHO FAB ─── -->
<button class="carrinho-fab oculto" id="carrinho-fab" onclick="abrirCarrinho()">
  <i class="fas fa-shopping-bag fab-icon"></i>
  <span>Carrinho</span>
  <span class="carrinho-badge" id="carrinho-badge">0</span>
</button>

<!-- ─── PAINEL CARRINHO ─── -->
<div class="carrinho-overlay" id="carrinho-overlay" onclick="fecharCarrinhoFora(event)">
  <aside class="carrinho-painel">

    <div class="carrinho-head">
      <div class="carrinho-title serif">
        <i class="fas fa-shopping-bag"></i>
        Meu Carrinho
      </div>
      <button class="btn-fechar" onclick="fecharCarrinho()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="carrinho-lista" id="carrinho-lista">
      <div class="carrinho-vazio" id="carrinho-vazio">
        <span class="vazio-icon">🛍️</span>
        <p>Seu carrinho está vazio.<br>Explore o catálogo e adicione produtos.</p>
      </div>
    </div>

    <div class="carrinho-foot">
      <div class="resumo-linha">
        <span class="label">Subtotal</span>
        <span class="valor" id="subtotal-val">R$ 0,00</span>
      </div>
      <div class="resumo-linha">
        <span class="label">Itens</span>
        <span class="valor" id="itens-val">0 produto(s)</span>
      </div>
      <div class="resumo-linha total">
        <span class="label">Total</span>
        <span class="valor" id="total-val">R$ 0,00</span>
      </div>

      <button class="btn-enviar-whats" id="btn-enviar-whats" onclick="enviarPedidoWhats()" disabled>
        <i class="fab fa-whatsapp" style="font-size:1.2rem;"></i>
        Finalizar no WhatsApp
      </button>

      <button class="btn-limpar" onclick="limparCarrinho()">
        <i class="fas fa-trash-alt"></i> Limpar carrinho
      </button>
    </div>

  </aside>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── PRODUTOS ───
const produtos = [
  {
    id: 1,
    nome: "Armação Titanium Slim",
    categoria: "Armações",
    desc: "Ultraleve em titânio, design minimalista europeu. Perfeita para uso diário.",
    preco: 589.00,
    emoji: "🕶️",
    topVendido: true
  },
  {
    id: 2,
    nome: "Óculos Solar Aviador Gold",
    categoria: "Solar",
    desc: "Lentes polarizadas UV400 com armação dourada. Elegância atemporal.",
    preco: 420.00,
    emoji: "😎",
    topVendido: true
  },
  {
    id: 3,
    nome: "Smartwatch Premium Pro",
    categoria: "Smartwatch",
    desc: "Monitor cardíaco, GPS integrado e 7 dias de bateria. Estilo e tecnologia.",
    preco: 1290.00,
    emoji: "⌚",
    topVendido: false
  },
  {
    id: 4,
    nome: "Armação Acetato Retrô",
    categoria: "Armações",
    desc: "Acetato italiano de alta qualidade. Visual vintage, acabamento impecável.",
    preco: 399.00,
    emoji: "👓",
    topVendido: false
  },
  {
    id: 5,
    nome: "Lentes Progressivas HD",
    categoria: "Lentes",
    desc: "Tecnologia de última geração. Visão nítida em todas as distâncias.",
    preco: 750.00,
    emoji: "🔬",
    topVendido: true
  },
  {
    id: 6,
    nome: "Óculos Solar Cat Eye",
    categoria: "Solar",
    desc: "Design feminino sofisticado com proteção total UV. Tendência da estação.",
    preco: 310.00,
    emoji: "🌸",
    topVendido: false
  },
  {
    id: 7,
    nome: "Smartwatch Sport Elite",
    categoria: "Smartwatch",
    desc: "À prova d'água 50m, notificações e modo multi-esporte avançado.",
    preco: 890.00,
    emoji: "🏃",
    topVendido: false
  },
  {
    id: 8,
    nome: "Estojo Premium Couro",
    categoria: "Acessórios",
    desc: "Estojo em couro legítimo com proteção total para suas armações.",
    preco: 89.00,
    emoji: "👜",
    topVendido: false
  },
  {
    id: 9,
    nome: "Kit Limpeza Óptico",
    categoria: "Acessórios",
    desc: "Solução profissional, flanela de microfibra e spray antiembaçante.",
    preco: 49.00,
    emoji: "✨",
    topVendido: false
  }
];

let carrinho = [];
let catAtual = "todos";

// ─── FORMATAR PREÇO ───
function fmt(v) {
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// ─── RENDER GRID ───
function renderGrid(cat) {
  const grid = document.getElementById('produtos-grid');
  const lista = cat === 'todos' ? produtos : produtos.filter(p => p.categoria === cat);

  grid.innerHTML = lista.map(p => {
    const noCart = carrinho.find(c => c.id === p.id);
    return `
    <div class="produto-card reveal" data-id="${p.id}">
      ${p.topVendido ? `<span class="badge-top"><i class="fas fa-fire"></i> Mais Vendido</span>` : ''}
      <div class="produto-img">
        <span class="produto-emoji">${p.emoji}</span>
      </div>
      <div class="produto-info">
        <div class="produto-categoria">${p.categoria}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-desc">${p.desc}</div>
        <div class="produto-rodape">
          <div class="produto-preco">
            <span class="produto-preco-label">Preço</span>
            <span class="produto-preco-valor">${fmt(p.preco)}</span>
          </div>
          <div class="card-btns">
            <button class="btn-whats-rapido" onclick="comprarRapido(${p.id})">
              <i class="fab fa-whatsapp"></i> Comprar
            </button>
            <button class="btn-add-carrinho ${noCart ? 'adicionado' : ''}" id="btn-add-${p.id}" onclick="addCarrinho(${p.id})">
              <i class="fas fa-${noCart ? 'check' : 'plus'}"></i>
              ${noCart ? 'No carrinho' : 'Carrinho'}
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Reveal
  requestAnimationFrame(() => {
    document.querySelectorAll('.produto-card.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('in'), i * 70);
    });
  });
}

// ─── FILTRAR ───
function filtrar(btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  catAtual = btn.dataset.cat;
  renderGrid(catAtual);
}

// ─── ADD CARRINHO ───
function addCarrinho(id) {
  const p = produtos.find(x => x.id === id);
  const exist = carrinho.find(x => x.id === id);

  if (exist) {
    exist.qty++;
  } else {
    carrinho.push({ ...p, qty: 1 });
  }

  atualizarBadge();
  renderCarrinho();
  atualizarBtnCard(id, true);
  showToast(`✓ ${p.nome} adicionado ao carrinho`);
}

function atualizarBtnCard(id, add) {
  const btn = document.getElementById(`btn-add-${id}`);
  if (!btn) return;
  if (add) {
    btn.innerHTML = `<i class="fas fa-check"></i> No carrinho`;
    btn.classList.add('adicionado');
  } else {
    btn.innerHTML = `<i class="fas fa-plus"></i> Carrinho`;
    btn.classList.remove('adicionado');
  }
}

// ─── COMPRAR RÁPIDO ───
function comprarRapido(id) {
  const p = produtos.find(x => x.id === id);
  const msg = `Olá! Gostaria de saber mais sobre:\n\n` +
    `*${p.nome}*\n` +
    `Categoria: ${p.categoria}\n` +
    `Valor: ${fmt(p.preco)}\n\n` +
    `Pode me ajudar com mais informações?`;
  window.open(`https://wa.me/5542998224827?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── ATUALIZAR BADGE ───
function atualizarBadge() {
  const total = carrinho.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('carrinho-badge');
  const fab = document.getElementById('carrinho-fab');

  badge.textContent = total;

  if (total > 0) {
    fab.classList.remove('oculto');
  } else {
    fab.classList.add('oculto');
  }
}

// ─── RENDER CARRINHO ───
function renderCarrinho() {
  const lista = document.getElementById('carrinho-lista');
  const vazio = document.getElementById('carrinho-vazio');
  const btnEnviar = document.getElementById('btn-enviar-whats');

  if (carrinho.length === 0) {
    lista.innerHTML = '';
    lista.appendChild(vazio);
    vazio.style.display = 'flex';
    btnEnviar.disabled = true;
    atualizarTotais();
    return;
  }

  btnEnviar.disabled = false;

  lista.innerHTML = carrinho.map(item => `
    <div class="carrinho-item" id="item-${item.id}">
      <div class="item-emoji-mini">${item.emoji}</div>
      <div class="item-info">
        <div class="item-nome">${item.nome}</div>
        <div class="item-cat">${item.categoria}</div>
        <div class="item-preco">${fmt(item.preco * item.qty)}</div>
      </div>
      <div class="item-qty">
        <button class="qty-btn" onclick="alterarQty(${item.id}, -1)"><i class="fas fa-minus"></i></button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="alterarQty(${item.id}, 1)"><i class="fas fa-plus"></i></button>
      </div>
      <button class="btn-remover" onclick="removerItem(${item.id})" title="Remover">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  `).join('');

  atualizarTotais();
}

function atualizarTotais() {
  const total = carrinho.reduce((s, i) => s + i.preco * i.qty, 0);
  const itens = carrinho.reduce((s, i) => s + i.qty, 0);
  document.getElementById('subtotal-val').textContent = fmt(total);
  document.getElementById('total-val').textContent = fmt(total);
  document.getElementById('itens-val').textContent = `${itens} produto(s)`;
}

// ─── ALTERAR QUANTIDADE ───
function alterarQty(id, delta) {
  const item = carrinho.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) {
    removerItem(id);
    return;
  }
  atualizarBadge();
  renderCarrinho();
}

// ─── REMOVER ITEM ───
function removerItem(id) {
  carrinho = carrinho.filter(x => x.id !== id);
  atualizarBadge();
  renderCarrinho();
  atualizarBtnCard(id, false);
}

// ─── LIMPAR CARRINHO ───
function limparCarrinho() {
  carrinho = [];
  atualizarBadge();
  renderCarrinho();
  document.querySelectorAll('.btn-add-carrinho').forEach(btn => {
    const id = parseInt(btn.id.replace('btn-add-', ''));
    atualizarBtnCard(id, false);
  });
}

// ─── ABRIR / FECHAR CARRINHO ───
function abrirCarrinho() {
  const ov = document.getElementById('carrinho-overlay');
  ov.style.display = 'block';
  requestAnimationFrame(() => ov.classList.add('ativo'));
  document.body.style.overflow = 'hidden';
  renderCarrinho();
}

function fecharCarrinho() {
  const ov = document.getElementById('carrinho-overlay');
  ov.classList.remove('ativo');
  setTimeout(() => { ov.style.display = 'none'; }, 400);
  document.body.style.overflow = '';
}

function fecharCarrinhoFora(e) {
  if (e.target === document.getElementById('carrinho-overlay')) fecharCarrinho();
}

// ─── ENVIAR PEDIDO WHATSAPP ───
function enviarPedidoWhats() {
  if (carrinho.length === 0) return;

  const itens = carrinho.map(i =>
    `▸ *${i.nome}* (${i.categoria}) × ${i.qty} — ${fmt(i.preco * i.qty)}`
  ).join('\n');

  const total = carrinho.reduce((s, i) => s + i.preco * i.qty, 0);
  const qtdTotal = carrinho.reduce((s, i) => s + i.qty, 0);

  const msg =
    `Olá! Gostaria de fazer um pedido na *Ótica Precisão de Virmond* 🕶️\n\n` +
    `📋 *Meu Pedido:*\n${itens}\n\n` +
    `🛍️ Total de itens: ${qtdTotal}\n` +
    `💰 *Valor total: ${fmt(total)}*\n\n` +
    `Poderia me ajudar a finalizar? Obrigado!`;

  window.open(`https://wa.me/5542998224827?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── REVEAL ───
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => io.observe(el));

// ─── INIT ───
renderGrid('todos');

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') fecharCarrinho();
});
</script>

</body>
</html>
